<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — LLMx Blog</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/blog/blog.css">
</head>
<body>

<header class="blog-site-header">
  <a href="/" class="wordmark">LLMx <span>— Studio</span></a>
  <nav>
    <a href="/blog/" class="active">Blog</a>
    <a href="/sprint/">Sprint</a>
    <a href="/#about">About</a>
  </nav>
</header>

<div class="post-layout">
  <!-- SIDEBAR -->
  <aside class="post-sidebar" id="sidebar">
    <a href="/blog/" class="sidebar-back">← All posts</a>
    <div class="sidebar-label">Contents</div>
    <ul class="toc-list" id="toc-list"></ul>
  </aside>

  <!-- MAIN -->
  <article class="post-main">
    <header class="post-header" id="post-header">
      <div class="post-series" id="post-series">LLMx — Field Notes</div>
      <h1 class="post-title" id="post-title">Loading…</h1>
      <div class="post-byline">
        <span class="author">Cyril Dowuona</span>
        <span class="sep">|</span>
        <span id="post-date"></span>
        <span class="sep">·</span>
        <span id="post-readtime"></span>
      </div>
    </header>

    <div class="post-body" id="post-body"></div>

    <footer class="post-footer">
      <div class="post-footer-label">LLMx Blog</div>
      <div class="post-footer-nav">
        <a href="/blog/" class="post-footer-link">← All posts</a>
        <a href="/#goods" class="post-footer-link">LLMx Studio →</a>
      </div>
    </footer>
  </article>
</div>

<script>
  // ── Minimal Markdown → HTML renderer ──────────────────────────────────
  function mdToHtml(md) {
    let html = md
      // Escape HTML entities first
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Fenced code blocks
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.trimEnd()}</code></pre>`);

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold and italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

    // Headings
    html = html.replace(/^### (.+)$/gm, '<h3 id="$1">$1</h3>');
    html = html.replace(/^## (.+)$/gm, (_, t) => {
      const id = t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      return `<h2 id="${id}">${t}</h2>`;
    });

    // HR
    html = html.replace(/^---$/gm, '<hr>');

    // Blockquotes
    html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

    // Unordered lists
    html = html.replace(/((?:^[*-] .+\n?)+)/gm, block => {
      const items = block.trim().split('\n').map(l => `<li>${l.replace(/^[*-] /, '')}</li>`).join('');
      return `<ul>${items}</ul>`;
    });

    // Ordered lists
    html = html.replace(/((?:^\d+\. .+\n?)+)/gm, block => {
      const items = block.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
      return `<ol>${items}</ol>`;
    });

    // Paragraphs — wrap lines not already wrapped in block elements
    const blockTags = /^<(h[1-6]|ul|ol|li|blockquote|pre|hr)/;
    html = html.split('\n\n').map(block => {
      block = block.trim();
      if (!block) return '';
      if (blockTags.test(block)) return block;
      return `<p>${block.replace(/\n/g, ' ')}</p>`;
    }).join('\n');

    return html;
  }

  // ── Load post ─────────────────────────────────────────────────────────
  async function loadPost() {
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    if (!id) { document.title = 'Post not found — LLMx'; return; }

    try {
      const res = await fetch('/blog/posts.json');
      const posts = await res.json();
      const post = posts.find(p => p.id === id && p.status === 'published');

      if (!post) {
        document.getElementById('post-title').textContent = 'Post not found.';
        return;
      }

      // Meta
      document.title = `${post.title} — LLMx Blog`;
      document.getElementById('post-title').textContent = post.title;
      document.getElementById('post-date').textContent = formatDate(post.date);
      document.getElementById('post-readtime').textContent = post.readtime || '';

      // Body
      const bodyEl = document.getElementById('post-body');
      bodyEl.innerHTML = mdToHtml(post.body || '');

      // Build TOC from h2s
      buildTOC(bodyEl);

    } catch (e) {
      document.getElementById('post-title').textContent = 'Could not load post.';
    }
  }

  function buildTOC(bodyEl) {
    const headings = bodyEl.querySelectorAll('h2, h3');
    const tocList = document.getElementById('toc-list');
    if (!headings.length) return;

    tocList.innerHTML = Array.from(headings).map(h => {
      const isH3 = h.tagName === 'H3';
      const id = h.id || h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      h.id = id;
      return `<li class="toc-item">
        <a class="toc-link${isH3 ? ' toc-h3' : ''}" href="#${id}">${h.textContent}</a>
      </li>`;
    }).join('');

    // Active TOC link on scroll
    const links = tocList.querySelectorAll('.toc-link');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          links.forEach(l => l.classList.remove('active'));
          const link = tocList.querySelector(`[href="#${entry.target.id}"]`);
          if (link) link.classList.add('active');
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' });

    headings.forEach(h => observer.observe(h));
  }

  function formatDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m,10)-1]} ${parseInt(d,10)}, ${y}`;
  }

  loadPost();
</script>

</body>
</html>
